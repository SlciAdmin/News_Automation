# render.yaml
services:
  - type: web
    name: news-automation
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: news-db
          property: connectionString
    healthCheckPath: /

databases:
  - name: news-db
    plan: free
    databaseName: broadcast_db
    user: broadcast_user